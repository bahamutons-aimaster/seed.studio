<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>seed.studio — Creator Assistant Program</title>
<meta name="description" content="Mulai langkah pertamamu di content creation. Temani, ngobrol, bantu ngonten di kafe 2 jam, dapatkan hingga Rp400.000/hari. Training gratis 3x pertemuan.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="brand">
      <span class="brand-icon" id="brandIcon">🌱</span>
      <span class="brand-name" id="brandName">seed.studio</span>
    </div>
    <div class="nav-links" id="navLinks"></div>
    <a href="#daftar" class="btn btn-sm nav-cta" id="navCta">Gabung Sekarang</a>
  </div>
</nav>

<header class="hero" id="home">
  <div class="wrap">
    <div class="hero-grid">
      <div>
        <span class="hero-badge" id="heroBadge"></span>
        <div class="hero-slides-text" id="heroSlidesText"></div>
        <div class="hero-cta">
          <a href="#daftar" class="btn" id="heroCtaPrimary"></a>
          <a href="#benefit" class="btn btn-outline" id="heroCtaSecondary"></a>
        </div>
        <div class="hero-social">
          <div class="hero-avatars" id="heroAvatars"></div>
          <span class="hero-social-text" id="heroSocialText"></span>
        </div>
        <div class="hero-controls">
          <button class="hero-arrow" id="heroPrev" aria-label="Sebelumnya">←</button>
          <div class="hero-dots" id="heroDots"></div>
          <button class="hero-arrow" id="heroNext" aria-label="Selanjutnya">→</button>
        </div>
        <div class="scarcity-bar" id="scarcityBar" style="margin-top:24px;"></div>
      </div>
      <div class="hero-visual">
        <div class="hero-img-wrap" id="heroImgWrap"></div>
        <div class="hero-quote-card" id="heroQuoteCard">
          <div class="hero-quote-icon" id="heroQuoteIcon"></div>
          <div class="hero-quote-text" id="heroQuoteText"></div>
        </div>
        <div class="hero-stat-card">
          <div class="hero-stat-label" id="heroStatLabel"></div>
          <div class="hero-stat-value" id="heroStatValue"></div>
          <div class="hero-stat-desc" id="heroStatDesc"></div>
        </div>
      </div>
    </div>
  </div>
</header>

<section class="stats">
  <div class="wrap">
    <div class="stats-bar" id="statsBar"></div>
  </div>
</section>

<section class="why-join" id="tentang">
  <div class="wrap">
    <div class="why-grid">
      <div class="why-visual">
        <img id="whyJoinImage" src="" alt="">
      </div>
      <div>
        <span class="eyebrow" id="whyEyebrow"></span>
        <h2 class="why-heading" id="whyHeading"></h2>
        <p class="why-body" id="whyBody"></p>
        <div class="check-list" id="whyChecklist"></div>
        <p class="why-closing" id="whyClosing"></p>
      </div>
    </div>
  </div>
</section>

<section class="cafe-section">
  <div class="wrap">
    <div class="cafe-head">
      <span class="eyebrow" id="cafeEyebrow" style="justify-content:center;"></span>
      <h2 id="cafeHeading"></h2>
      <p class="cafe-subtitle" id="cafeSubtitle"></p>
    </div>
    <div class="cafe-areas" id="cafeAreas"></div>
    <div class="cafe-area-cards" id="cafeAreaCards"></div>
    <div class="cafe-map" style="display:none;">
      <iframe id="cafeMapsEmbed" src="" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="Peta area syuting"></iframe>
    </div>
    <div class="cafe-marquees">
      <div>
        <div class="marquee-label">Cafe Partners</div>
        <div class="marquee-track-wrap">
          <div class="marquee-track rtl" id="logoMarquee"></div>
        </div>
      </div>
      <div>
        <div class="marquee-label">Behind The Scene</div>
        <div class="marquee-track-wrap">
          <div class="marquee-track" id="photoMarquee"></div>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="benefits" id="benefit">
  <div class="wrap">
    <div class="benefits-head">
      <span class="eyebrow" id="benefitsEyebrow" style="justify-content:center;"></span>
      <h2 id="benefitsHeading"></h2>
    </div>
    <div class="benefits-grid" id="benefitsGrid"></div>
  </div>
</section>

<section class="how-it-works" id="proses">
  <div class="wrap">
    <div class="how-head">
      <span class="eyebrow" id="howEyebrow" style="justify-content:center;"></span>
      <h2 id="howHeading"></h2>
    </div>
    <div class="steps-row" id="stepsRow"></div>
  </div>
</section>

<section class="gallery">
  <div class="wrap">
    <div class="gallery-top">
      <div class="gallery-head">
        <span class="eyebrow" id="galleryEyebrow"></span>
        <h2 id="galleryHeading"></h2>
      </div>
      <div class="gallery-nav">
        <button id="galPrev" aria-label="Sebelumnya">←</button>
        <button id="galNext" aria-label="Selanjutnya">→</button>
      </div>
    </div>
    <div class="gallery-track-wrap">
      <div class="gallery-track" id="galleryTrack"></div>
    </div>
  </div>
</section>

<section class="testimonials">
  <div class="wrap">
    <div class="testi-head">
      <span class="eyebrow" id="testiEyebrow" style="justify-content:center;"></span>
      <h2 id="testiHeading"></h2>
    </div>
    <div class="testi-grid" id="testiGrid"></div>
  </div>
</section>

<section class="bottom-grid" id="faq">
  <div class="wrap">
    <div class="bottom-grid-inner">

      <div class="panel" id="syarat">
        <div class="panel-head">
          <span class="eyebrow" id="reqEyebrow"></span>
          <h3 id="reqHeading"></h3>
        </div>
        <ul class="req-checklist" id="reqList"></ul>
      </div>

      <div class="panel">
        <div class="panel-head">
          <span class="eyebrow" id="faqEyebrow"></span>
          <h3 id="faqHeading"></h3>
        </div>
        <div class="faq-list" id="faqList"></div>
      </div>

      <div class="panel" id="daftar">
        <div class="panel-head">
          <span class="eyebrow" id="formEyebrow"></span>
          <h3 id="formHeading"></h3>
        </div>
        <form id="regForm">
          <div class="form-grid">
            <div class="form-field">
              <label>Nama Lengkap</label>
              <input class="form-input" type="text" name="nama" required>
            </div>
            <div class="form-field">
              <label>Umur</label>
              <input class="form-input" type="number" name="umur" min="18" max="40" required>
            </div>
            <div class="form-field">
              <label>Domisili (Kota)</label>
              <input class="form-input" type="text" name="domisili" required>
            </div>
            <div class="form-field">
              <label>Status</label>
              <select class="form-select" name="status" required>
                <option value="">Pilih status</option>
                <option value="Mahasiswa">Mahasiswa</option>
                <option value="Fresh Graduate">Fresh Graduate</option>
              </select>
            </div>
            <div class="form-field">
              <label>Instagram</label>
              <input class="form-input" type="text" name="instagram" placeholder="@username" required>
            </div>
            <div class="form-field">
              <label>Nomor WhatsApp</label>
              <input class="form-input" type="tel" name="whatsapp" placeholder="08xxxxxxxxxx" required>
            </div>
          </div>
          <div class="form-field full" style="margin-bottom:14px;">
            <label>Kenapa kamu ingin bergabung di seed.studio?</label>
            <textarea class="form-textarea" name="alasan" rows="3" required></textarea>
          </div>
          <label class="form-field full" style="flex-direction:row; align-items:flex-start; gap:8px; margin-bottom:14px;">
            <input type="checkbox" name="confirmAge" required style="margin-top:3px;">
            <span style="font-size:0.82rem; color:var(--muted);">Saya menyatakan bahwa usia saya 18 tahun ke atas.</span>
          </label>
          <button type="submit" class="btn form-submit" id="formSubmitBtn"></button>
          <p class="form-consent" id="formConsent"></p>
          <p class="form-err" id="formErr" style="display:none;"></p>
        </form>
        <div id="formSuccess" style="display:none;"></div>
      </div>

    </div>
  </div>
</section>

<footer id="kontak">
  <div class="wrap">
    <div class="footer-grid">
      <div class="footer-brand">
        <div class="brand">
          <span class="brand-icon" id="footerBrandIcon">🌱</span>
          <span class="brand-name" id="footerBrandName">seed.studio</span>
        </div>
        <p class="footer-tagline" id="footerTagline"></p>
      </div>
      <div class="footer-col">
        <h4>Connect</h4>
        <div id="footerSocials"></div>
      </div>
      <div class="footer-col">
        <h4>Quick Links</h4>
        <div id="footerQuickLinks"></div>
        <h4 style="margin-top:18px;">Location</h4>
        <div id="footerLocation"></div>
        <div id="footerEmail"></div>
      </div>
    </div>
    <div class="footer-bottom">
      <span class="footer-copyright" id="footerCopyright"></span>
      <a href="/admin.html" class="footer-admin">Admin</a>
    </div>
  </div>
</footer>

<!-- Floating WhatsApp Button -->
<a href="#" class="wa-float" id="waFloatBtn" target="_blank" rel="noopener">
  <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
</a>

<!-- Sticky Bottom CTA -->
<div class="sticky-cta" id="stickyCta">
  <span class="sticky-cta-text">🌱 <strong>Hanya 3 slot tersisa</strong> — Daftar sekarang sebelum penuh!</span>
  <div class="sticky-cta-actions">
    <a href="#daftar" class="btn btn-sm">Daftar Sekarang</a>
  </div>
</div>

<script src="/script.js"></script>
</body>
</html>
